---
layout: default
---

<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    {% if page.tags %}
      <p>
        {% for tag in page.tags %}
          <a href="{{ '/tags.html#' | append: tag | relative_url }}" class="tag">{{ tag }}</a>
        {% endfor %}
      </p>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
